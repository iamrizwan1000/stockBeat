name: 'Auth — Social sign-in'
description: |-

  Apple/Google one-tap, an alternative to email OTP. Both providers converge on the same
  user record as OTP by verified email — signing in with a different method never creates
  a second account.
endpoints:
  -
    custom: []
    httpMethods:
      - POST
    uri: api/v1/auth/social
    metadata:
      custom: []
      groupName: 'Auth — Social sign-in'
      groupDescription: |-

        Apple/Google one-tap, an alternative to email OTP. Both providers converge on the same
        user record as OTP by verified email — signing in with a different method never creates
        a second account.
      subgroup: ''
      subgroupDescription: ''
      title: 'Sign in with Apple or Google.'
      description: |-
        Verifies the client-obtained id_token server-side, then issues a Sanctum bearer token.
        Same response shape as `/auth/otp/verify` — `is_new_user` tells the client whether to
        route into `/profile/setup` next.
      authenticated: false
      deprecated: false
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      provider:
        custom: []
        name: provider
        description: ''
        required: true
        example: apple
        type: string
        enumValues:
          - apple
          - google
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      id_token:
        custom: []
        name: id_token
        description: ''
        required: true
        example: architecto
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
    cleanBodyParameters:
      provider: apple
      id_token: architecto
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: |-
          {
            "success": true,
            "message": null,
            "data": {
              "token": "1|abcdef1234567890",
              "is_new_user": false,
              "user": {
                "id": 1,
                "name": "Jamie Rivera",
                "email": "jamie@example.com",
                "business_name": "Rivera Vintage Co",
                "base_currency": "AUD",
                "timezone": "Australia/Sydney",
                "sells_on": ["woocommerce"]
              }
            }
          }
        headers: []
        description: success
      -
        custom: []
        status: 422
        content: |-
          {
            "success": false,
            "message": "This sign-in token is invalid or has expired.",
            "errors": {
              "id_token": ["This sign-in token is invalid or has expired."]
            }
          }
        headers: []
        description: 'invalid token'
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
