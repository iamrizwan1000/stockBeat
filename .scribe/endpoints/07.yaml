name: Billing
description: |-

  Entitlements are also available embedded in `GET /me` — these are dedicated, lighter-weight
  endpoints for after a purchase completes, without re-fetching the rest of `/me`'s payload.
endpoints:
  -
    custom: []
    httpMethods:
      - GET
    uri: api/v1/billing/entitlements
    metadata:
      custom: []
      groupName: Billing
      groupDescription: |-

        Entitlements are also available embedded in `GET /me` — these are dedicated, lighter-weight
        endpoints for after a purchase completes, without re-fetching the rest of `/me`'s payload.
      subgroup: ''
      subgroupDescription: ''
      title: 'Get current entitlements.'
      description: |-
        Same `entitlements` shape as `GET /me`. The backend is the single source of truth
        (Plan §6.1) — the app should check its RevenueCat SDK locally for an instant unlock
        right after a purchase, then call this (or `POST /billing/sync`) to reconcile.
      authenticated: true
      deprecated: false
    headers:
      Authorization: 'Bearer {YOUR_SANCTUM_TOKEN}'
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: |-
          {
            "success": true,
            "message": null,
            "data": {
              "plan": "pro",
              "limits": { "max_stores": 10, "sms_monthly": 100 },
              "subscription_status": "active",
              "trial_ends_at": null,
              "sms_balance": 42,
              "ai_questions_remaining": 148
            }
          }
        headers: []
        description: success
      -
        custom: []
        status: 422
        content: |-
          {
            "success": false,
            "message": "Complete profile setup first.",
            "errors": null
          }
        headers: []
        description: 'profile setup not complete'
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer 6g43cv8PD1aE5beadkZfhV6'
    controller: null
    method: null
    route: null
  -
    custom: []
    httpMethods:
      - POST
    uri: api/v1/billing/sync
    metadata:
      custom: []
      groupName: Billing
      groupDescription: |-

        Entitlements are also available embedded in `GET /me` — these are dedicated, lighter-weight
        endpoints for after a purchase completes, without re-fetching the rest of `/me`'s payload.
      subgroup: ''
      subgroupDescription: ''
      title: 'Sync with RevenueCat and get fresh entitlements.'
      description: |-
        Call this after a purchase completes locally (StoreKit/Play Billing via the RevenueCat
        SDK) or when the merchant taps "Restore Purchases" — links this device's RevenueCat
        identity to the team's subscription and pulls the subscriber's current state directly
        from RevenueCat rather than waiting for a webhook, which is the only reliable way to
        support restore on a new device (a restore doesn't always fire a webhook). Fails open:
        if RevenueCat itself is unreachable, existing entitlements are returned unchanged rather
        than erroring (Plan §17.5 — never lock out a paying user over a RevenueCat outage).

        Only reconciles the renewing subscription, never SMS/AI top-ups — Apple/Google's own
        restore-purchases rules don't cover consumables, so those stay webhook-only.
      authenticated: true
      deprecated: false
    headers:
      Authorization: 'Bearer {YOUR_SANCTUM_TOKEN}'
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      rc_app_user_id:
        custom: []
        name: rc_app_user_id
        description: 'Must not be greater than 255 characters.'
        required: true
        example: b
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
    cleanBodyParameters:
      rc_app_user_id: b
    fileParameters: []
    responses:
      -
        custom: []
        status: 200
        content: |-
          {
            "success": true,
            "message": null,
            "data": {
              "plan": "pro",
              "limits": { "max_stores": 10, "sms_monthly": 100 },
              "subscription_status": "active",
              "trial_ends_at": null,
              "sms_balance": 42,
              "ai_questions_remaining": 148
            }
          }
        headers: []
        description: success
      -
        custom: []
        status: 422
        content: |-
          {
            "success": false,
            "message": "Complete profile setup first.",
            "errors": null
          }
        headers: []
        description: 'profile setup not complete'
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer 6g43cv8PD1aE5beadkZfhV6'
    controller: null
    method: null
    route: null
