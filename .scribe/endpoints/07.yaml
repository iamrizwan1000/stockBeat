name: Connections
description: |-

  Connect and manage storefront platforms (Shopify, WooCommerce, eBay, Etsy, Amazon).
  Only WooCommerce is fully live end-to-end today — the others accept a connection
  record but adapter operations are not yet available.
endpoints:
  -
    custom: []
    httpMethods:
      - POST
    uri: 'api/v1/connections/{platform}/start'
    metadata:
      custom: []
      groupName: Connections
      groupDescription: |-

        Connect and manage storefront platforms (Shopify, WooCommerce, eBay, Etsy, Amazon).
        Only WooCommerce is fully live end-to-end today — the others accept a connection
        record but adapter operations are not yet available.
      subgroup: ''
      subgroupDescription: ''
      title: 'Start connecting a store.'
      description: |-
        `credentials` shape depends on `platform` — WooCommerce expects `{store_url, consumer_key,
        consumer_secret}` (key-intake); OAuth-based platforms (Shopify/eBay/Etsy/Amazon) are
        pending adapter approval and will return an OAuth URL once available.
      authenticated: true
      deprecated: false
    headers:
      Authorization: 'Bearer {YOUR_SANCTUM_TOKEN}'
      Content-Type: application/json
      Accept: application/json
    urlParameters:
      platform:
        custom: []
        name: platform
        description: 'One of `shopify`, `woo`, `ebay`, `etsy`, `amazon`.'
        required: true
        example: woo
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        deprecated: false
    cleanUrlParameters:
      platform: woo
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      name:
        custom: []
        name: name
        description: 'Must not be greater than 255 characters.'
        required: true
        example: b
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
      credentials:
        custom: []
        name: credentials
        description: ''
        required: false
        example: null
        type: object
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        deprecated: false
    cleanBodyParameters:
      name: b
    fileParameters: []
    responses:
      -
        custom: []
        status: 201
        content: |-
          {
            "success": true,
            "message": null,
            "data": {
              "connection": {
                "id": 1,
                "platform": "woo",
                "name": "Rivera Vintage Co",
                "status": "active",
                "last_sync_at": null,
                "webhook_status": "registered"
              }
            }
          }
        headers: []
        description: success
      -
        custom: []
        status: 422
        content: |-
          {
            "success": false,
            "message": "Complete profile setup before connecting a store.",
            "errors": null
          }
        headers: []
        description: 'profile setup incomplete'
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer 6g43cv8PD1aE5beadkZfhV6'
    controller: null
    method: null
    route: null
