openapi: 3.0.3
info:
  title: 'StockBeat API Documentation'
  description: 'Token-authenticated REST API consumed by the StockBeat mobile app (React Native).'
  version: 1.0.0
servers:
  - url: 'https://stockbeat.ddev.site'
tags:
  - name: 'AI Assistant'
    description: "\nData Copilot + natural-language Rule Builder (Plan §4.12). Every answer\nis grounded in real tool-call results over the team's own data\n(`AssistantToolRegistry`) — never a raw guess."
  - name: Account
    description: "\nGDPR-related self-service actions."
  - name: Analytics
    description: "\nAnalytics-lite (Plan §4.6): today/7d/30d revenue + order count + AOV, gated by plan\n(`analytics_level`: Free=today only, Starter=+7d, Pro/Premium=full with comparison + goal\ntracking). \"Today\" is always computed live, never from the `daily_stats` pre-aggregation."
  - name: Announcements
    description: ''
  - name: 'Auth — OTP'
    description: "\nPasswordless sign-in: request a one-time code by email, then verify it for a bearer token."
  - name: 'Auth — Profile'
    description: ''
  - name: 'Auth — Session'
    description: ''
  - name: Config
    description: "\nRemote app config (Plan §10/§17.7) — deliberately unauthenticated so a\nkilled app version or a maintenance banner can be checked before the\nuser has signed in."
  - name: Connections
    description: "\nConnect and manage storefront platforms (Shopify, WooCommerce, eBay, Etsy, Amazon, TikTok Shop).\nOnly WooCommerce is fully live end-to-end today — the others accept a connection\nrecord but adapter operations are not yet available."
  - name: Devices
    description: ''
  - name: Inbox
    description: "\nUnified customer inbox (Plan §4.5). `sendMessage` (in `SendInboxMessageAction`)\nroutes per-thread by channel: Shopify/Woo via order-linked email, eBay via\nreal Trading API member messages, Etsy the same way but gated behind its\nown conversations-API approval, Amazon out of scope until that adapter's\nbuilt."
  - name: Me
    description: ''
  - name: Notifications
    description: ''
  - name: Orders
    description: "\nThe unified order feed across all connected channels, plus quick actions\n(fulfill/tracking, refund, cancel, notes/tags, packing slip)."
  - name: Products
    description: "\nPolled product/stock snapshots (Plan §4.4's `low_stock` trigger) — not a\ncatalog management feature. The only seller-editable field is\n`cost_price` (Plan §4.12 Phase B), since no platform API exposes true\ncost-of-goods."
  - name: Rules
    description: "\nCustom notification rules: trigger + condition tree + actions, with quiet hours, cooldown,\nand an execution log. See Plan §4.4 for the full trigger catalogue (12 triggers, e.g.\n`new_order`, `unfulfilled_after_x`, `order_spike`, `low_stock`, `digest`)."
  - name: Settings
    description: ''
  - name: Support
    description: "\nLive support chat (Plan §4.9). One thread per user, resumed across visits —\nnever a fresh thread. Internal staff notes (`direction=note`) are never\nreturned here."
  - name: Team
    description: "\nTeam seats and roles (owner/manager/staff), with per-member `store_visibility` restriction."
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Obtain a token via `POST /auth/otp/request` then `POST /auth/otp/verify` (Laravel Sanctum bearer token).'
security:
  -
    default: []
paths:
  /api/v1/assistant/ask:
    post:
      summary: 'Ask the assistant a question.'
      operationId: askTheAssistantAQuestion
      description: ''
      parameters: []
      responses:
        422:
          description: 'quota exhausted'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: "You've used all 30 AI questions included in your plan this month. Upgrade or wait for next month's reset."
                  errors:
                    question:
                      - "You've used all 30 AI questions included in your plan this month. Upgrade or wait for next month's reset."
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "You've used all 30 AI questions included in your plan this month. Upgrade or wait for next month's reset."
                  errors:
                    type: object
                    properties:
                      question:
                        type: array
                        example:
                          - "You've used all 30 AI questions included in your plan this month. Upgrade or wait for next month's reset."
                        items:
                          type: string
      tags:
        - 'AI Assistant'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                question:
                  type: string
                  description: 'Must not be greater than 1000 characters.'
                  example: b
                conversation_id:
                  type: integer
                  description: 'Must match an existing stored value.'
                  example: 16
                  nullable: true
                mode:
                  type: string
                  description: ''
                  example: help
                  enum:
                    - data
                    - help
              required:
                - question
  /api/v1/assistant/conversations:
    get:
      summary: "List this team's AI Assistant conversations, most recent first."
      operationId: listThisTeamsAIAssistantConversationsMostRecentFirst
      description: ''
      parameters: []
      responses: {}
      tags:
        - 'AI Assistant'
  '/api/v1/assistant/conversations/{id}':
    get:
      summary: "Show one conversation's full message history."
      operationId: showOneConversationsFullMessageHistory
      description: ''
      parameters: []
      responses: {}
      tags:
        - 'AI Assistant'
    parameters:
      -
        in: path
        name: id
        description: 'The ID of the conversation.'
        example: 16
        required: true
        schema:
          type: integer
  /api/v1/assistant/rule-draft:
    post:
      summary: 'Generate a structured rule draft from a plain-English prompt (Pro+).'
      operationId: generateAStructuredRuleDraftFromAPlainEnglishPromptPro+
      description: "Never persists — the client must POST the returned draft to\n`POST /rules` after the seller confirms it."
      parameters: []
      responses: {}
      tags:
        - 'AI Assistant'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                prompt:
                  type: string
                  description: 'Must not be greater than 500 characters.'
                  example: b
              required:
                - prompt
  /api/v1/account/data-export:
    post:
      summary: 'Request a data export.'
      operationId: requestADataExport
      description: 'Queues a GDPR data export; the user receives it by email.'
      parameters: []
      responses:
        200:
          description: success
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: "We're preparing your data export — you'll receive it by email shortly."
                  data: null
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "We're preparing your data export — you'll receive it by email shortly."
                  data:
                    type: string
                    example: null
                    nullable: true
      tags:
        - Account
  /api/v1/account/delete-request:
    post:
      summary: 'Request account deletion.'
      operationId: requestAccountDeletion
      description: 'Schedules a GDPR soft-delete; the account is retained for a grace period before purge.'
      parameters: []
      responses:
        200:
          description: success
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'Your account has been scheduled for deletion.'
                  data: null
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Your account has been scheduled for deletion.'
                  data:
                    type: string
                    example: null
                    nullable: true
      tags:
        - Account
  /api/v1/analytics/summary:
    get:
      summary: 'Get the analytics summary.'
      operationId: getTheAnalyticsSummary
      description: '`comparison` and `goal` are only present at the `full` analytics level (Pro/Premium).'
      parameters:
        -
          in: query
          name: range
          description: 'One of `today`, `7d`, `30d`.'
          example: 7d
          required: true
          schema:
            type: string
            description: 'One of `today`, `7d`, `30d`.'
            example: 7d
      responses:
        200:
          description: ''
          content:
            application/json:
              schema:
                oneOf:
                  -
                    description: 'full (Pro/Premium)'
                    type: object
                    example:
                      success: true
                      message: null
                      data:
                        range: 7d
                        total:
                          revenue: 1840.0
                          revenue_base: 1840.0
                          orders_count: 23
                          aov: 80.0
                        by_channel:
                          -
                            connection_id: 1
                            platform: woo
                            name: 'Rivera Vintage Co'
                            revenue: 1840.0
                            revenue_base: 1840.0
                            orders_count: 23
                            aov: 80.0
                        comparison:
                          previous_period_revenue: 1500.0
                          change_pct: 22.7
                        goal:
                          current_month_revenue: 4200.0
                          best_month_revenue: 6100.0
                          pct_of_best_month: 68.9
                    properties:
                      success:
                        type: boolean
                        example: true
                      message:
                        type: string
                        example: null
                        nullable: true
                      data:
                        type: object
                        properties:
                          range:
                            type: string
                            example: 7d
                          total:
                            type: object
                            properties:
                              revenue:
                                type: number
                                example: 1840.0
                              revenue_base:
                                type: number
                                example: 1840.0
                              orders_count:
                                type: integer
                                example: 23
                              aov:
                                type: number
                                example: 80.0
                          by_channel:
                            type: array
                            example:
                              - connection_id: 1
                                platform: woo
                                name: 'Rivera Vintage Co'
                                revenue: 1840
                                revenue_base: 1840
                                orders_count: 23
                                aov: 80
                            items:
                              type: object
                              properties:
                                connection_id:
                                  type: integer
                                  example: 1
                                platform:
                                  type: string
                                  example: woo
                                name:
                                  type: string
                                  example: 'Rivera Vintage Co'
                                revenue:
                                  type: number
                                  example: 1840.0
                                revenue_base:
                                  type: number
                                  example: 1840.0
                                orders_count:
                                  type: integer
                                  example: 23
                                aov:
                                  type: number
                                  example: 80.0
                          comparison:
                            type: object
                            properties:
                              previous_period_revenue:
                                type: number
                                example: 1500.0
                              change_pct:
                                type: number
                                example: 22.7
                          goal:
                            type: object
                            properties:
                              current_month_revenue:
                                type: number
                                example: 4200.0
                              best_month_revenue:
                                type: number
                                example: 6100.0
                              pct_of_best_month:
                                type: number
                                example: 68.9
                  -
                    description: 'today only (Free)'
                    type: object
                    example:
                      success: true
                      message: null
                      data:
                        range: today
                        total:
                          revenue: 240.0
                          revenue_base: 240.0
                          orders_count: 3
                          aov: 80.0
                        by_channel:
                          -
                            connection_id: 1
                            platform: woo
                            name: 'Rivera Vintage Co'
                            revenue: 240.0
                            revenue_base: 240.0
                            orders_count: 3
                            aov: 80.0
                    properties:
                      success:
                        type: boolean
                        example: true
                      message:
                        type: string
                        example: null
                        nullable: true
                      data:
                        type: object
                        properties:
                          range:
                            type: string
                            example: today
                          total:
                            type: object
                            properties:
                              revenue:
                                type: number
                                example: 240.0
                              revenue_base:
                                type: number
                                example: 240.0
                              orders_count:
                                type: integer
                                example: 3
                              aov:
                                type: number
                                example: 80.0
                          by_channel:
                            type: array
                            example:
                              - connection_id: 1
                                platform: woo
                                name: 'Rivera Vintage Co'
                                revenue: 240
                                revenue_base: 240
                                orders_count: 3
                                aov: 80
                            items:
                              type: object
                              properties:
                                connection_id:
                                  type: integer
                                  example: 1
                                platform:
                                  type: string
                                  example: woo
                                name:
                                  type: string
                                  example: 'Rivera Vintage Co'
                                revenue:
                                  type: number
                                  example: 240.0
                                revenue_base:
                                  type: number
                                  example: 240.0
                                orders_count:
                                  type: integer
                                  example: 3
                                aov:
                                  type: number
                                  example: 80.0
        422:
          description: 'range not allowed on this plan'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'The given data was invalid.'
                  errors:
                    range:
                      - 'Upgrade your plan for more analytics history.'
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'The given data was invalid.'
                  errors:
                    type: object
                    properties:
                      range:
                        type: array
                        example:
                          - 'Upgrade your plan for more analytics history.'
                        items:
                          type: string
      tags:
        - Analytics
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                range:
                  type: string
                  description: ''
                  example: today
                  enum:
                    - today
                    - 7d
                    - 30d
  /api/v1/analytics/products:
    get:
      summary: 'Get top products.'
      operationId: getTopProducts
      description: 'Grouped by SKU, falling back to title for SKU-less line items. Same plan gating as the summary.'
      parameters:
        -
          in: query
          name: range
          description: 'One of `today`, `7d`, `30d`.'
          example: 7d
          required: true
          schema:
            type: string
            description: 'One of `today`, `7d`, `30d`.'
            example: 7d
      responses:
        200:
          description: success
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: null
                  data:
                    products:
                      -
                        sku: VNT-014
                        title: 'Vintage Denim Jacket'
                        units: 12
                        revenue: 1008.0
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: null
                    nullable: true
                  data:
                    type: object
                    properties:
                      products:
                        type: array
                        example:
                          - sku: VNT-014
                            title: 'Vintage Denim Jacket'
                            units: 12
                            revenue: 1008
                        items:
                          type: object
                          properties:
                            sku:
                              type: string
                              example: VNT-014
                            title:
                              type: string
                              example: 'Vintage Denim Jacket'
                            units:
                              type: integer
                              example: 12
                            revenue:
                              type: number
                              example: 1008.0
      tags:
        - Analytics
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                range:
                  type: string
                  description: ''
                  example: 30d
                  enum:
                    - today
                    - 7d
                    - 30d
  /api/v1/announcements:
    get:
      summary: 'List active announcements.'
      operationId: listActiveAnnouncements
      description: "In-app banners currently active (within `starts_at`/`ends_at`) and matching the caller's\naudience rules, newest first."
      parameters: []
      responses:
        200:
          description: success
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: null
                  data:
                    announcements:
                      -
                        id: 1
                        title: 'New: order-spike alerts'
                        body: 'Premium now includes order and refund spike alerts.'
                        dismissible: true
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: null
                    nullable: true
                  data:
                    type: object
                    properties:
                      announcements:
                        type: array
                        example:
                          - id: 1
                            title: 'New: order-spike alerts'
                            body: 'Premium now includes order and refund spike alerts.'
                            dismissible: true
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                              example: 1
                            title:
                              type: string
                              example: 'New: order-spike alerts'
                            body:
                              type: string
                              example: 'Premium now includes order and refund spike alerts.'
                            dismissible:
                              type: boolean
                              example: true
      tags:
        - Announcements
  '/api/v1/announcements/{announcement_id}/dismiss':
    post:
      summary: 'Dismiss an announcement.'
      operationId: dismissAnAnnouncement
      description: "Per-user — other users targeted by the same announcement are unaffected.\nIdempotent: dismissing twice is not an error."
      parameters: []
      responses:
        200:
          description: success
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'Announcement dismissed.'
                  data: null
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Announcement dismissed.'
                  data:
                    type: string
                    example: null
                    nullable: true
        422:
          description: 'not dismissible'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'The given data was invalid.'
                  errors:
                    announcement:
                      - "This announcement can't be dismissed."
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'The given data was invalid.'
                  errors:
                    type: object
                    properties:
                      announcement:
                        type: array
                        example:
                          - "This announcement can't be dismissed."
                        items:
                          type: string
      tags:
        - Announcements
    parameters:
      -
        in: path
        name: announcement_id
        description: 'The ID of the announcement.'
        example: 16
        required: true
        schema:
          type: integer
  /api/v1/auth/otp/request:
    post:
      summary: 'Request an OTP code.'
      operationId: requestAnOTPCode
      description: "Always returns 200 regardless of whether the email is registered, to avoid account enumeration.\nRate limited (`otp-request`); a fresh code can be requested every 30s."
      parameters: []
      responses:
        200:
          description: success
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: 'A verification code has been sent if the email is registered.'
                  data: null
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'A verification code has been sent if the email is registered.'
                  data:
                    type: string
                    example: null
                    nullable: true
      tags:
        - 'Auth — OTP'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address. Must not be greater than 255 characters.'
                  example: gbailey@example.net
              required:
                - email
      security: []
  /api/v1/auth/otp/verify:
    post:
      summary: 'Verify an OTP code.'
      operationId: verifyAnOTPCode
      description: "Returns a Sanctum bearer token on success. `is_new_user` tells the client whether to route\ninto `/profile/setup` next. Rate limited (`otp-verify`); locks out after 5 failed attempts."
      parameters: []
      responses:
        200:
          description: success
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: null
                  data:
                    token: 1|abcdef1234567890
                    is_new_user: false
                    user:
                      id: 1
                      name: 'Jamie Rivera'
                      email: jamie@example.com
                      business_name: 'Rivera Vintage Co'
                      base_currency: AUD
                      timezone: Australia/Sydney
                      sells_on:
                        - woocommerce
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: null
                    nullable: true
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: 1|abcdef1234567890
                      is_new_user:
                        type: boolean
                        example: false
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          name:
                            type: string
                            example: 'Jamie Rivera'
                          email:
                            type: string
                            example: jamie@example.com
                          business_name:
                            type: string
                            example: 'Rivera Vintage Co'
                          base_currency:
                            type: string
                            example: AUD
                          timezone:
                            type: string
                            example: Australia/Sydney
                          sells_on:
                            type: array
                            example:
                              - woocommerce
                            items:
                              type: string
        422:
          description: 'invalid or expired code'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'That code is invalid or has expired.'
                  errors: null
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'That code is invalid or has expired.'
                  errors:
                    type: string
                    example: null
                    nullable: true
      tags:
        - 'Auth — OTP'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: 'Must be a valid email address. Must not be greater than 255 characters.'
                  example: gbailey@example.net
                code:
                  type: string
                  description: 'Must be 6 digits.'
                  example: '569775'
              required:
                - email
                - code
      security: []
  /api/v1/profile/setup:
    post:
      summary: 'Complete profile setup.'
      operationId: completeProfileSetup
      description: "One-time step for new users after OTP verification. Creates the user's owning `Team`\n(with the user as `owner`) alongside setting their profile fields."
      parameters: []
      responses:
        200:
          description: success
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: null
                  data:
                    user:
                      id: 1
                      name: 'Jamie Rivera'
                      email: jamie@example.com
                      business_name: 'Rivera Vintage Co'
                      base_currency: AUD
                      timezone: Australia/Sydney
                      sells_on:
                        - woocommerce
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: null
                    nullable: true
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          name:
                            type: string
                            example: 'Jamie Rivera'
                          email:
                            type: string
                            example: jamie@example.com
                          business_name:
                            type: string
                            example: 'Rivera Vintage Co'
                          base_currency:
                            type: string
                            example: AUD
                          timezone:
                            type: string
                            example: Australia/Sydney
                          sells_on:
                            type: array
                            example:
                              - woocommerce
                            items:
                              type: string
      tags:
        - 'Auth — Profile'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: b
                business_name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: 'n'
                  nullable: true
                phone:
                  type: string
                  description: 'Must match the regex /^\+[1-9]\d{1,14}$/.'
                  example: '+36'
                  nullable: true
                sells_on:
                  type: array
                  description: ''
                  example:
                    - amazon
                  items:
                    type: string
                    enum:
                      - shopify
                      - woo
                      - ebay
                      - etsy
                      - amazon
                      - tiktok
                timezone:
                  type: string
                  description: ''
                  example: America/Barbados
                  enum:
                    - Africa/Abidjan
                    - Africa/Accra
                    - Africa/Addis_Ababa
                    - Africa/Algiers
                    - Africa/Asmara
                    - Africa/Bamako
                    - Africa/Bangui
                    - Africa/Banjul
                    - Africa/Bissau
                    - Africa/Blantyre
                    - Africa/Brazzaville
                    - Africa/Bujumbura
                    - Africa/Cairo
                    - Africa/Casablanca
                    - Africa/Ceuta
