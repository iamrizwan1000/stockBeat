  '/api/v1/connections/{platform}/start':
    post:
      summary: 'Start connecting a store.'
      operationId: startConnectingAStore
      description: "`credentials` shape depends on `platform`: WooCommerce expects `{store_url, consumer_key,\nconsumer_secret}` (key-intake, connects immediately). Shopify expects `{shop_domain}`.\neBay/Etsy expect no credentials at all. Amazon is still pending adapter approval.\nOAuth platforms (Shopify/eBay/Etsy) don't connect immediately — this returns an\n`authorization_url` to open in an in-app browser; the connection itself is created once\nthe merchant approves and the platform redirects back to our callback."
      parameters: []
      responses:
        200:
          description: 'shopify/ebay/etsy — OAuth redirect'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: null
                  data:
                    authorization_url: 'https://my-shop.myshopify.com/admin/oauth/authorize?client_id=...'
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: null
                    nullable: true
                  data:
                    type: object
                    properties:
                      authorization_url:
                        type: string
                        example: 'https://my-shop.myshopify.com/admin/oauth/authorize?client_id=...'
        201:
          description: 'woo — connects immediately'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: true
                  message: null
                  data:
                    connection:
                      id: 1
                      platform: woo
                      name: 'Rivera Vintage Co'
                      status: active
                      last_sync_at: null
                      webhook_status: registered
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: null
                    nullable: true
                  data:
                    type: object
                    properties:
                      connection:
                        type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          platform:
                            type: string
                            example: woo
                          name:
                            type: string
                            example: 'Rivera Vintage Co'
                          status:
                            type: string
                            example: active
                          last_sync_at:
                            type: string
                            example: null
                            nullable: true
                          webhook_status:
                            type: string
                            example: registered
        422:
          description: 'profile setup incomplete'
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  message: 'Complete profile setup before connecting a store.'
                  errors: null
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: 'Complete profile setup before connecting a store.'
                  errors:
                    type: string
                    example: null
                    nullable: true
      tags:
        - Connections
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 255 characters.'
                  example: b
                credentials:
                  type: object
                  description: ''
                  example: null
                  properties: {}
              required:
                - name
    parameters:
      -
        in: path
        name: platform
        description: 'One of `shopify`, `woo`, `ebay`, `etsy`, `amazon`, `tiktok`.'
        example: woo
        required: true
        schema:
          type: string
